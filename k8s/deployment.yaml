apiVersion: apps/v1
kind: Deployment
metadata:
  name: aclab
  labels:
    app: aclab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aclab
  template:
    metadata:
      labels:
        app: aclab
    spec:
      containers:
        - name: aclab
          image: aclab:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aclab-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aclab-secrets
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: aclab-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aclab-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aclab-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1024Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30

---

apiVersion: v1
kind: Service
metadata:
  name: aclab
spec:
  selector:
    app: aclab
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP